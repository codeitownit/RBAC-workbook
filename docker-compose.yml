services:
  postgres:
    image: postgres:16-alpine
    container_name: workbook_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: workbook
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workbook"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: workbook_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy   # waits for DB to be ready
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/workbook
      JWT_SECRET: change-this-in-production
      CLIENT_URL: http://localhost:5173
      NODE_ENV: production
    ports:
      - "4000:4000"

  # Optional: run frontend in Docker too
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   ports:
  #     - "5173:80"
  #   depends_on:
  #     - backend

volumes:
  postgres_data: